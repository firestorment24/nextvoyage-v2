<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>The Reserve | NexVoyage Collective</title>  
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200;300&display=swap" rel="stylesheet">  
    <style>  
        :root {  
            --brass: #d4af37;  
            --shadow: #050505;  
            --ledger-ink: #f0f0f0;  
            --dim-brass: rgba(212, 175, 55, 0.3);  
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {  
            background-color: var(--shadow);  
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);  
            color: var(--ledger-ink);  
            font-family: 'Inter', sans-serif;  
            min-height: 100vh;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            padding: 40px;  
        }

        .dossier-wrapper {  
            max-width: 900px;  
            width: 100%;  
            position: relative;  
            padding: 80px;  
            border: 1px solid rgba(212, 175, 55, 0.1);  
            background: rgba(0, 0, 0, 0.8);  
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);  
        }

        /* The Brass Frame Corner Accents */  
        .dossier-wrapper::before, .dossier-wrapper::after {  
            content: '';  
            position: absolute;  
            width: 20px;  
            height: 20px;  
            border: 1px solid var(--brass);  
        }  
        .dossier-wrapper::before { top: 20px; left: 20px; border-right: none; border-bottom: none; }  
        .dossier-wrapper::after { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        header {  
            text-align: center;  
            margin-bottom: 80px;  
        }

        h1 {  
            font-family: 'Cormorant Garamond', serif;  
            font-size: 4rem;  
            color: var(--brass);  
            text-transform: uppercase;  
            letter-spacing: 0.6em; /* Maximum Tracking */  
            font-weight: 300;  
            margin-bottom: 20px;  
            line-height: 1;  
        }

        .sub-header {  
            font-size: 0.75rem;  
            text-transform: uppercase;  
            letter-spacing: 0.4em;  
            color: rgba(255,255,255,0.4);  
            font-weight: 200;  
        }

        .ledger-form {  
            display: grid;  
            grid-template-columns: 1fr 1fr;  
            gap: 50px 40px;  
        }

        .field-group {  
            position: relative;  
            border-bottom: 1px solid var(--dim-brass);  
            padding-bottom: 10px;  
            transition: border-color 0.6s ease;  
        }

        .field-group:focus-within {  
            border-color: var(--brass);  
        }

        .full-width { grid-column: span 2; }

        label {  
            display: block;  
            font-size: 0.65rem;  
            text-transform: uppercase;  
            letter-spacing: 0.25em;  
            color: var(--brass);  
            margin-bottom: 15px;  
            opacity: 0.8;  
        }

        input, textarea {  
            width: 100%;  
            background: transparent;  
            border: none;  
            outline: none;  
            color: var(--ledger-ink);  
            font-family: 'Cormorant Garamond', serif;  
            font-size: 1.4rem;  
            font-weight: 300;  
            letter-spacing: 0.05em;  
        }

        textarea {  
            height: 100px;  
            resize: none;  
        }

        ::placeholder {  
            color: rgba(255,255,255,0.1);  
            font-style: italic;  
        }

        .submit-container {  
            grid-column: span 2;  
            display: flex;  
            justify-content: center;  
            margin-top: 60px;  
        }

        .submit-btn {  
            background: transparent;  
            border: 1px solid var(--brass);  
            color: var(--brass);  
            padding: 20px 60px;  
            font-size: 0.8rem;  
            text-transform: uppercase;  
            letter-spacing: 0.4em;  
            cursor: pointer;  
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);  
            position: relative;  
            overflow: hidden;  
        }

        .submit-btn:hover {  
            background: var(--brass);  
            color: var(--shadow);  
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);  
        }

        @media (max-width: 768px) {  
            .ledger-form { grid-template-columns: 1fr; }  
            .full-width { grid-column: span 1; }  
            .dossier-wrapper { padding: 40px 20px; }  
            h1 { font-size: 2.5rem; letter-spacing: 0.3em; }  
        }  
    </style>  
</head>  
<body>

<div class="dossier-wrapper">  
    <header>  
        <h1>The Reserve</h1>  
        <p class="sub-header">Beginning the Dialogue</p>  
    </header>

    <form class="ledger-form">  
        <div class="field-group">  
            <label>Full Name</label>  
            <input type="text" placeholder="Elias Thorne">  
        </div>

        <div class="field-group">  
            <label>Email Address</label>  
            <input type="email" placeholder="e.thorne@domain.com">  
        </div>

        <div class="field-group">  
            <label>Desired Dates</label>  
            <input type="text" placeholder="Autumn 2026">  
        </div>

        <div class="field-group">  
            <label>City of Interest</label>  
            <input type="text" placeholder="Kyoto">  
        </div>

        <div class="field-group full-width">  
            <label>The Vision</label>  
            <textarea placeholder="Describe the journey you wish to manifest..."></textarea>  
        </div>

        <div class="field-group full-width">  
            <label>Aesthetic Notes</label>  
            <textarea placeholder="Textures, tones, and sensory requirements..."></textarea>  
        </div>

        <div class="submit-container">  
            <button type="submit" class="submit-btn">Submit to the Ledger</button>  
        </div>  
    </form>  
</div>

</body>  
</html>
